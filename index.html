<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Decorate window.fetch so that libraries attempting to mock or override it 
      // do not throw read-only / non-writable Property/TypeError in sandboxed/iframe environments.
      (function() {
        try {
          var originalFetch = window.fetch;
          var currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() {
              return currentFetch || originalFetch;
            },
            set: function(val) {
              currentFetch = val;
            }
          });
        } catch (err) {
          console.warn('Unable to decorate window.fetch with custom descriptor:', err);
        }
      })();

      // Apply minimalist patch for sandboxed iframe issues
      window.addEventListener('error', function(e) {
        if (e.message && e.message.includes('getContext')) {
          console.warn('Caught getContext error in sandbox:', e);
          e.preventDefault();
        }
      });
    </script>
